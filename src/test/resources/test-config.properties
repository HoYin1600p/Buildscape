# Test configuration for BuildScape API Integration Tests
# Copy this file to test-config.local.properties and fill in your test credentials
# API Base URL
api.base.url=http://localhost:8888/.netlify/functions
# Test credentials (use test accounts only - never commit real credentials)
# These should be valid Minecraft UUID and access token for integration testing
test.uuid=
test.access.token=
# Test redeem code for redemption testing
test.redeem.code=TEST123
# Expected response timeout in milliseconds
test.timeout.ms=10000
# Enable/disable integration tests (set to true to run)
tests.integration.enabled=false
