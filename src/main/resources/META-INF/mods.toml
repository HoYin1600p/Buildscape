modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "buildscape.online"
logoFile = "buildscape.png"
authors = "${mod_authors}"

description = '''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="AFTER"
    side = "BOTH"

[[mods]]
modId = "zz_buildscape_variants"
version = "${mod_version}"
displayName = "BuildScape Variant Engine Late Loader"
description = "Internal late-loader for BuildScape to ensure all modded blocks are scanned."
authors = "BuildScape Team"

[[dependencies.zz_buildscape_variants]]
    modId="buildscape"
    mandatory=true
    versionRange="[3.0.2,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.zz_buildscape_variants]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"
